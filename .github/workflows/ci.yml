name: CI

on: push

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: http://localhost:8081
      LOGIN: client
      PASSWORD: client
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      PLAYWRIGHT_HTML_OPEN: never
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout awesome-localstack
        uses: actions/checkout@v4
        with:
          repository: slawekradzyminski/awesome-localstack
          path: awesome-localstack

      - name: Start application stack
        working-directory: awesome-localstack
        run: |
          chmod +x ./run-docker-compose-ci.sh
          ./run-docker-compose-ci.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npm run test:api -- --reporter=list,html

      - name: Run UI tests
        run: npm run test:ui -- --reporter=list,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop application stack
        if: always()
        working-directory: awesome-localstack
        run: docker compose -f docker-compose-ci.yml down -v
