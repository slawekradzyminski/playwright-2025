name: CI

on: push

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: http://localhost:8081
      LOGIN: client
      PASSWORD: client
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      PLAYWRIGHT_HTML_OPEN: never
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout awesome-localstack
        uses: actions/checkout@v6
        with:
          repository: slawekradzyminski/awesome-localstack
          path: awesome-localstack

      - name: Start application stack
        working-directory: awesome-localstack
        run: |
          docker compose -f lightweight-docker-compose.yml up -d
          for url in \
            http://localhost:8081/swagger-ui/index.html \
            http://localhost:8081/login \
            http://localhost:8081/images/iphone.png
          do
            echo "Waiting for ${url}"
            for attempt in {1..300}; do
              status=$(curl -sL -m 5 -w "%{http_code}" "$url" -o /dev/null || true)
              if [ "$status" = "200" ]; then
                echo "${url} is ready"
                break
              fi
              if [ "$attempt" = "300" ]; then
                docker compose -f lightweight-docker-compose.yml ps
                docker compose -f lightweight-docker-compose.yml logs --tail=200
                exit 1
              fi
              sleep 1
            done
          done

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run API tests
        run: npm run test:api -- --reporter=list,html

      - name: Run UI tests
        run: npm run test:ui -- --reporter=list,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 1
